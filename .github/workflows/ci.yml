name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # schema-compat diffs against the merge base

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed on:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Must be built with a Go >= the go directive in go.mod (1.25).
          version: v2.5

      - name: go test
        run: go test -race ./...

      - name: schema compatibility
        env:
          SCHEMA_COMPAT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./scripts/schema-compat.sh

      - name: dependency gate
        run: ./scripts/depgate.sh

  dogfood-check:
    # The P1 release canary (ROADMAP success criterion,
    # .claude/skills/dogfood-check/): runs on every push to main (the closest
    # proxy to "before releases" — there is no separate release workflow)
    # and on any PR labeled approval-path, per issue #19's acceptance
    # criteria. A release does not ship, and an approval-path PR does not
    # merge, on a failing dogfood-check.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'approval-path')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: dogfood-check
        run: go run ./e2e/dogfood
